<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Trabajos - Shorts Engine</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .toolbar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .toolbar-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            text-decoration: none;
            border-radius: 999px;
            padding: 0.65rem 0.95rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .toolbar-link:hover {
            border-color: rgba(88, 166, 255, 0.35);
            background: rgba(88, 166, 255, 0.12);
        }
        .search-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .search-bar input { flex: 1; padding: 10px; background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 2rem; align-items: center; flex-wrap: wrap; }
        .page-btn { padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; border-radius: 4px; cursor: pointer; }
        .page-btn.active { background: var(--primary); border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .action-btn { padding: 4px 10px; font-size: 0.75rem; border-radius: 5px; cursor: pointer; border: none; }
        .btn-delete { background: rgba(248,81,73,0.2); color: #f85149; border: 1px solid #f85149; }
        .btn-view { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #58a6ff; }
        .status-select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            padding: 3px 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .status-select:focus { outline: none; border-color: var(--primary); }
        .channel-shell {
            border: 1px solid rgba(88, 166, 255, 0.18);
            background: rgba(88, 166, 255, 0.05);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            margin: 0 0 1rem;
        }
        .channel-breadcrumb {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.84rem;
            margin-bottom: 0.8rem;
        }
        .channel-breadcrumb a {
            color: #fff;
            text-decoration: none;
        }
        .channel-tabs {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        .channel-tab {
            text-decoration: none;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.55rem 0.85rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
        }
        .channel-tab.active {
            background: rgba(88, 166, 255, 0.15);
            color: #58a6ff;
            border-color: rgba(88, 166, 255, 0.3);
            font-weight: 700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-align: left;
        }
        th {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-content {
            width: min(420px, 100%);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .modal-footer {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .modal-footer .modal-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .modal-btn {
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            cursor: pointer;
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Historial de Trabajos</h1>
            <div class="toolbar">
                <a href="/settings" class="toolbar-link">⚙ Ajustes</a>
            </div>
        </header>

        <section id="channel-shell" class="channel-shell" style="display:none;">
            <div class="channel-breadcrumb">
                <a href="/channels">Canales</a>
                <span>›</span>
                <span id="channel-breadcrumb-name">Canal</span>
                <span>›</span>
                <strong>Trabajos</strong>
            </div>
            <div class="channel-tabs">
                <a id="tab-overview" class="channel-tab" href="#">Resumen</a>
                <a id="tab-storyboard" class="channel-tab" href="#">Crear vídeos</a>
                <a id="tab-gallery" class="channel-tab" href="#">Galería</a>
                <a id="tab-jobs" class="channel-tab active" href="#">Trabajos</a>
                <a id="tab-ai-tasks" class="channel-tab" href="#">Registros IA</a>
                <a id="tab-history" class="channel-tab" href="#">Historial</a>
                <a id="tab-settings" class="channel-tab" href="#">Ajustes</a>
            </div>
        </section>

        <section class="search-bar">
            <input type="text" id="job-search" placeholder="Buscar por texto, ID o nicho..." oninput="debounceSearch()">
            <button onclick="fetchJobs(1)">Buscar</button>
        </section>

        <section class="history card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Estado</th>
                        <th>Creado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="jobs-table">
                    <tr>
                        <td colspan="5" class="empty-state">Cargando trabajos...</td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination-controls"></div>
        </section>
    </div>

    <div id="videoModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVideoModal()">&times;</span>
            <div style="width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden;">
                <video id="previewPlayer" controls style="width: 100%; height: 100%; object-fit: contain;"></video>
            </div>
            <div class="modal-footer">
                <button class="modal-btn" onclick="downloadCurrentVideo()" style="background: var(--secondary);">Descargar</button>
                <button class="modal-btn" onclick="shareCurrentVideo()" style="background: var(--primary);">Compartir</button>
                <a id="backToJobsLink" class="modal-btn modal-link" href="/jobs" style="background: #333;">Volver a trabajos del canal</a>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentVideoUrl = '';

        function getChannelIdFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('channel_id');
            if (!raw) return null;
            const value = parseInt(raw, 10);
            return Number.isFinite(value) ? value : null;
        }

        async function loadChannelContext() {
            const channelId = getChannelIdFromQuery();
            if (!channelId) return;

            try {
                const res = await fetch(`/api/youtube/channels/${channelId}`);
                if (!res.ok) return;

                const channel = await res.json();
                document.title = `Trabajos - ${channel.internal_name || 'Canal'} - Shorts Engine`;
                document.getElementById('channel-shell').style.display = 'block';
                document.getElementById('channel-breadcrumb-name').textContent = channel.internal_name || `Canal ${channelId}`;
                document.getElementById('tab-overview').href = `/channels/${channelId}`;
                document.getElementById('tab-storyboard').href = `/storyboard?channel_id=${channelId}`;
                document.getElementById('tab-gallery').href = `/gallery?channel_id=${channelId}`;
                document.getElementById('tab-jobs').href = `/jobs?channel_id=${channelId}`;
                document.getElementById('tab-ai-tasks').href = `/ai-tasks?channel_id=${channelId}`;
                document.getElementById('tab-history').href = `/channels/${channelId}/history`;
                document.getElementById('tab-settings').href = `/youtube-channels?channel_id=${channelId}`;
            } catch (e) {
                console.error('No se pudo cargar el canal:', e);
            }
        }

        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => fetchJobs(1), 400);
        }

        async function fetchJobs(page = 1) {
            currentPage = page;
            const search = document.getElementById('job-search').value;
            const channelId = getChannelIdFromQuery();
            const table = document.getElementById('jobs-table');
            table.innerHTML = '<tr><td colspan="5" class="empty-state">Cargando trabajos...</td></tr>';

            const res = await fetch(`/api/jobs?page=${page}&limit=25&search=${encodeURIComponent(search)}${channelId ? `&channel_id=${channelId}` : ''}`);
            const data = await res.json();

            if (!data.jobs || !data.jobs.length) {
                table.innerHTML = '<tr><td colspan="5" class="empty-state">No se encontraron trabajos.</td></tr>';
                renderPagination(data.total || 0, data.page || 1, data.limit || 25);
                return;
            }

            table.innerHTML = '';
            data.jobs.forEach(job => {
                const row = document.createElement('tr');
                const displayTitle = job.title || (job.text ? `${job.text.substring(0, 50)}...` : job.job_id);
                const canPlay = job.status === 'rendered' || job.status === 'completed';

                const statusCell = job.status === 'rendered'
                    ? `<select class="status-select" id="sel-${job.job_id}" onchange="updateStatus('${job.job_id}', this.value)">
                            <option value="rendered" ${job.status === 'rendered' ? 'selected' : ''}>⏳ Renderizado</option>
                            <option value="completed" ${job.status === 'completed' ? 'selected' : ''}>✅ Completado</option>
                       </select>`
                    : `<span class="badge badge-${job.status}">${job.status}</span>`;

                row.innerHTML = `
                    <td style="font-family:monospace; font-size:0.8rem;">${job.job_id.substring(0, 12)}</td>
                    <td style="max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${job.title || job.text || ''}">${displayTitle}</td>
                    <td>${statusCell}</td>
                    <td style="font-size:0.85rem; color:var(--text-muted);">${new Date(job.created_at).toLocaleString('es-ES')}</td>
                    <td style="display:flex; gap:6px; flex-wrap:wrap;">
                        <button class="action-btn" style="background:#333; color:#fff;" onclick="window.location.href='/storyboard?job_id=${job.job_id}'">✏️</button>
                        ${canPlay ? `<button class="action-btn btn-view" onclick="previewVideo('${job.video_url}', ${job.channel_id ?? 'null'})">▶</button>` : ''}
                        <button class="action-btn btn-delete" onclick="deleteJob('${job.job_id}')">🗑</button>
                    </td>
                `;
                table.appendChild(row);
            });

            renderPagination(data.total || 0, data.page || 1, data.limit || 25);
        }

        function renderPagination(total, page, limit) {
            const container = document.getElementById('pagination-controls');
            const totalPages = Math.max(1, Math.ceil(total / limit));
            container.innerHTML = '';

            const prev = document.createElement('button');
            prev.className = 'page-btn';
            prev.textContent = 'Anterior';
            prev.disabled = page <= 1;
            prev.onclick = () => fetchJobs(page - 1);
            container.appendChild(prev);

            const info = document.createElement('span');
            info.style.color = 'var(--text-muted)';
            info.textContent = `Página ${page} de ${totalPages}`;
            container.appendChild(info);

            const next = document.createElement('button');
            next.className = 'page-btn';
            next.textContent = 'Siguiente';
            next.disabled = page >= totalPages;
            next.onclick = () => fetchJobs(page + 1);
            container.appendChild(next);
        }

        async function updateStatus(jobId, newStatus) {
            const res = await fetch(`/api/jobs/${jobId}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            if (!res.ok) {
                alert('No se pudo actualizar el estado.');
                return;
            }
            fetchJobs(currentPage);
        }

        async function deleteJob(jobId) {
            if (!confirm('¿Seguro que quieres eliminar este trabajo?')) return;
            const res = await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
            if (!res.ok) {
                alert('No se pudo eliminar el trabajo.');
                return;
            }
            fetchJobs(currentPage);
        }

        function previewVideo(url, channelId = null) {
            currentVideoUrl = url;
            const modal = document.getElementById('videoModal');
            document.getElementById('previewPlayer').src = url;
            document.getElementById('backToJobsLink').href = channelId ? `/jobs?channel_id=${channelId}` : '/jobs';
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            document.getElementById('previewPlayer').pause();
            document.getElementById('previewPlayer').removeAttribute('src');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        function downloadCurrentVideo() {
            if (!currentVideoUrl) return;
            const link = document.createElement('a');
            link.href = currentVideoUrl;
            link.download = currentVideoUrl.split('/').pop() || 'video.mp4';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        async function shareCurrentVideo() {
            if (!currentVideoUrl) return;
            if (navigator.share) {
                await navigator.share({ url: currentVideoUrl, title: 'Vídeo de Shorts Engine' });
            } else {
                await navigator.clipboard.writeText(currentVideoUrl);
                alert('Enlace copiado al portapapeles.');
            }
        }

        document.getElementById('videoModal').addEventListener('click', (event) => {
            if (event.target.id === 'videoModal') closeVideoModal();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeVideoModal();
        });

        loadChannelContext().then(() => fetchJobs(1));
    </script>
</body>
</html>
